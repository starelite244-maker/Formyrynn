<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>For My Rynn</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: black;
      }

      /* 🔥 TAMBAHAN LOADING */
      #loading {
        position: fixed;
        inset: 0;
        background: white;
        display: flex;
        justify-content: center;
        align-items: center;
        color: red;
        font-family: "great vibes";
        font-size: 30px;
        z-index: 999;
        transition: opacity 1s ease;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div style="text-align: center">
        <div>For My Rynn....</div>

        <!-- GIF -->
        <img src="dudu.gif" style="width: 120px; margin: 15px 0" />

        <!-- LOADING BAR -->
        <div
          style="
            width: 200px;
            height: 6px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
          "
        >
          <div
            id="loading-bar"
            style="
              width: 0%;
              height: 100%;
              background: palevioletred;
              transition: width 0.3s;
            "
          ></div>
        </div>
      </div>
    </div>

    <button
      id="playBtn"
      style="
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 20px;
        font-size: 16px;
        background: palevioletred;
        color: white;
        border: none;
        border-radius: 10px;
        z-index: 1000;
        display: none;
      "
    >
      ▶ Play Music
    </button>

    <!-- 🔥 TAMBAHAN MUSIC -->
    <audio id="bgm" loop>
      <source src="lagu.mp3" type="audio/mpeg" />
    </audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

    <script>
      const scene = new THREE.Scene();

      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      camera.position.set(0, 2, 30);

      const photos = [];
      function createPhotoTexture(imagePath) {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = 512;
        canvas.height = 512;

        const texture = new THREE.CanvasTexture(canvas);

        const img = new Image();
        img.src = imagePath;

        img.onload = () => {
          ctx.fillStyle = "white";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          ctx.beginPath();
          ctx.roundRect(0, 0, canvas.width, canvas.height, 40);
          ctx.clip();
          ctx.drawImage(img, 20, 20, canvas.width - 40, canvas.height - 40);

          texture.needsUpdate = true;
        };

        return texture;
      }

      const textures = [
        createPhotoTexture("Foto/1.jpeg"),
        createPhotoTexture("Foto/2.jpg"),
        createPhotoTexture("Foto/3.jpg"),
        createPhotoTexture("Foto/4.jpeg"),
        createPhotoTexture("Foto/5.jpg"),
        createPhotoTexture("Foto/6.jpg"),
        createPhotoTexture("Foto/7.jpg"),
        createPhotoTexture("Foto/8.jpg"),
        createPhotoTexture("Foto/9.jpg"),
        createPhotoTexture("Foto/10.jpeg"),
        createPhotoTexture("Foto/11.jpg"),
        createPhotoTexture("Foto/12.jpg"),
        createPhotoTexture("Foto/13.jpg"),
        createPhotoTexture("Foto/14.jpg"),
        createPhotoTexture("Foto/15.jpg"),
        createPhotoTexture("Foto/16.jpg"),
        createPhotoTexture("Foto/17.jpg"),
        createPhotoTexture("Foto/18.jpg"),
        createPhotoTexture("Foto/19.jpg"),
        createPhotoTexture("Foto/20.jpg"),
      ];

      const totalPhotos = 100;
      const shuffled = [...textures].sort(() => Math.random() - 0.5);

      for (let i = 0; i < totalPhotos; i++) {
        const tex = shuffled[i % shuffled.length];

        const geo = new THREE.PlaneGeometry(1.5, 1.5);
        const mat = new THREE.MeshBasicMaterial({
          map: tex,
          side: THREE.DoubleSide,
        });

        const mesh = new THREE.Mesh(geo, mat);

        mesh.userData.angle = (i / totalPhotos) * Math.PI * 2;
        mesh.userData.radius = 6 + Math.random() * 20;
        mesh.userData.height = 0.5;
        mesh.userData.speed = 0.00001;

        mesh.scale.set(0.9, 0.9, 0.9);

        scene.add(mesh);
        photos.push(mesh);
      }

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.toneMappingExposure = 1.3;
      document.body.appendChild(renderer.domElement);

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.enabled = false;

      // 🔥 PLAY MUSIC SETELAH INTERAKSI USER
      const bgm = document.getElementById("bgm");

      function playMusic() {
        bgm.play().catch(() => {});
      }

      // support HP + klik
      window.addEventListener("click", playMusic);
      window.addEventListener("touchstart", playMusic);

      controls.target.set(0, 0, 0);
      controls.enableZoom = true;
      controls.enableRotate = true;
      controls.enablePan = false;
      controls.minDistance = 6;
      controls.maxDistance = 40;
      controls.maxPolarAngle = Math.PI;
      controls.minPolarAngle = 0;

      const count = 12000;
      const lovePositions = [];
      const spherePositions = [];

      for (let i = 0; i < count; i++) {
        let t = Math.random() * Math.PI * 2;
        let r = Math.random();

        let x = 16 * Math.pow(Math.sin(t), 3) * r;
        let y =
          (13 * Math.cos(t) -
            5 * Math.cos(2 * t) -
            2 * Math.cos(3 * t) -
            Math.cos(4 * t)) *
          r;

        let spread = 0.08;
        x += (Math.random() - 0.5) * spread;
        y += (Math.random() - 0.5) * spread;

        let dist = Math.sqrt(x * x + y * y);
        let normalized = Math.min(dist / 5, 1);
        let push = 1 + (1 - normalized) * 0.25;

        x *= push;
        y *= push;

        x *= 0.28;
        y *= 0.28;

        let z = (Math.random() - 0.5) * 1.0;

        lovePositions.push(x, y, z);

        let theta = Math.random() * Math.PI * 2;
        let phi = Math.acos(Math.random() * 2 - 1);
        let radius = 3.8;

        spherePositions.push(
          radius * Math.sin(phi) * Math.cos(theta),
          radius * Math.sin(phi) * Math.sin(theta),
          radius * Math.cos(phi),
        );
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute(
        "position",
        new THREE.Float32BufferAttribute(lovePositions, 3),
      );

      const material = new THREE.PointsMaterial({
        color: 0xff0000,
        size: 0.01,
        transparent: true,
        blending: THREE.AdditiveBlending,
      });

      const particles = new THREE.Points(geometry, material);
      scene.add(particles);

      // 🔥 TAMBAHKAN BINTANG
      const starCount = 4000;
      const starPositions = [];

      for (let i = 0; i < starCount; i++) {
        starPositions.push(
          (Math.random() - 0.5) * 100,
          (Math.random() - 0.5) * 100,
          (Math.random() - 0.5) * 100,
        );
      }

      const starGeo = new THREE.BufferGeometry();
      starGeo.setAttribute(
        "position",
        new THREE.Float32BufferAttribute(starPositions, 3),
      );

      const starMat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.12,
        transparent: true,
        blending: THREE.AdditiveBlending,
      });

      const stars = new THREE.Points(starGeo, starMat);
      scene.add(stars);

      // 🔥 TAMBAHKAN RING
      const ringCount = 20000;
      const ringPositions = [];

      for (let i = 0; i < ringCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = 5 + Math.random() * 15;

        ringPositions.push(
          Math.cos(angle) * radius,
          (Math.random() - 0.5) * 0.6,
          Math.sin(angle) * radius,
        );
      }

      const ringGeo = new THREE.BufferGeometry();
      ringGeo.setAttribute(
        "position",
        new THREE.Float32BufferAttribute(ringPositions, 3),
      );

      const ringMat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.08,
        transparent: true,
        blending: THREE.AdditiveBlending,
      });

      const ring = new THREE.Points(ringGeo, ringMat);
      scene.add(ring);

      // 🔥 TAMBAHKAN TEXT LAGI
      const FontLoader = new THREE.FontLoader();

      FontLoader.load(
        "https://threejs.org/examples/fonts/optimer_regular.typeface.json",
        function (font) {
          const textGeo = new THREE.TextGeometry("I Love You Rynn", {
            font: font,
            size: 1.5,
            height: 0.4,
          });

          const textMat = new THREE.MeshBasicMaterial({
            color: 0xffffff,
          });

          const textMesh = new THREE.Mesh(textGeo, textMat);

          // 🔥 posisi di atas love
          textMesh.position.set(-7, 8, 0);

          scene.add(textMesh);
        },
      );

      let introProgress = 0;
      let phase = "in"; // in → out → done

      const startZ = 30;
      const endZ = 8;
      let morph = 0;
      let loadingDone = false;

      function animate() {
        requestAnimationFrame(animate);

        // 🎥 ZOOM IN → ZOOM OUT LOOP
        // 🎥 INTRO ZOOM
        if (loadingDone && phase !== "done") {
          if (phase === "in") {
            introProgress += 0.01;

            let ease = 1 - Math.pow(1 - introProgress, 3);

            camera.position.z = startZ - (startZ - endZ) * ease;
            camera.position.y = 2 + Math.sin(ease * Math.PI) * 2;

            if (introProgress >= 1) {
              phase = "out";
            }
          } else if (phase === "out") {
            introProgress -= 0.01;

            let ease = 1 - Math.pow(1 - introProgress, 3);

            camera.position.z = startZ - (startZ - endZ) * ease;
            camera.position.y = 2 + Math.sin(ease * Math.PI) * 2;

            if (introProgress <= 0) {
              phase = "done";

              // 🔥 AKTIFKAN CONTROL USER
              controls.enabled = true;
            }
          }
        }

        const positions = geometry.attributes.position.array;

        let dist = camera.position.distanceTo(controls.target);
        let targetMorph = THREE.MathUtils.clamp((20 - dist) / 10, 0, 1);
        morph += (targetMorph - morph) * 0.08;

        for (let i = 0; i < count; i++) {
          let i3 = i * 3;

          positions[i3] =
            lovePositions[i3] * (1 - morph) + spherePositions[i3] * morph;

          positions[i3 + 1] =
            lovePositions[i3 + 1] * (1 - morph) +
            spherePositions[i3 + 1] * morph;

          positions[i3 + 2] =
            lovePositions[i3 + 2] * (1 - morph) +
            spherePositions[i3 + 2] * morph;
        }

        geometry.attributes.position.needsUpdate = true;

        particles.rotation.y += 0.005;

        // 🔥 BALIKKAN FOTO
        photos.forEach((p) => {
          p.userData.angle += p.userData.speed * 50;

          p.position.x = Math.cos(p.userData.angle) * p.userData.radius;
          p.position.z = Math.sin(p.userData.angle) * p.userData.radius;

          p.position.y =
            p.userData.height + Math.sin(p.userData.angle * 2) * 0.2;

          p.quaternion.copy(camera.quaternion);
        });

        // 🔥 BALIKKAN BINTANG
        if (typeof stars !== "undefined") {
          stars.rotation.y += 0.0005;

          const time = Date.now() * 0.002;
          stars.material.opacity = 0.7 + Math.sin(time) * 0.3;

          stars.position.z += 0.02;
          if (stars.position.z > 5) {
            stars.position.z = -5;
          }
        }

        // 🔥 BALIKKAN RING
        if (typeof ring !== "undefined") {
          ring.rotation.y += 0.002;
        }

        controls.update();
        renderer.render(scene, camera);
      }

      animate();

      let loadProgress = 0;

      const loadingInterval = setInterval(() => {
        loadProgress += 1; // kecepatan loading

        const bar = document.getElementById("loading-bar");
        if (bar) bar.style.width = loadProgress + "%";

        if (loadProgress >= 100) {
          clearInterval(loadingInterval);

          const loading = document.getElementById("loading");
          if (loading) {
            loading.style.opacity = 0;

            setTimeout(() => {
              loading.remove();
              loadingDone = true;

              // 🔥 tampilkan tombol play
              const btn = document.getElementById("playBtn");
              btn.style.display = "block";

              btn.addEventListener("click", () => {
                bgm.play();
                btn.style.display = "none";
              }); // 🔥 ini yang penting
            }, 1000);
          }
        }
      }, 40);

      window.addEventListener("resize", () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
      });
    </script>
  </body>
</html>
